    --yellow: #d97706;
    --green: #059669;

    --pink: #db2777;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #e0f2fe 0%, #f0f4f8 40%, #faf5ff 100%);

    min-height: 100vh;
    position: relative;
  }
  body::before { display: none; }
  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 36px 20px 60px; }


  /* HEADER */
  .header { margin-bottom: 28px; }
  .badge { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 10px var(--teal); }
  .badge-text { font-size: 11px; letter-spacing: 4px; color: var(--teal); text-transform: uppercase; }
  h1 { font-size: clamp(24px, 5vw, 30px); font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
  h1 span { color: var(--teal); }
  .header-meta { font-size: 12px; color: #475569; }

  /* TABS */
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    padding: 9px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab-btn.active { font-weight: 700; }
  .tag {
    font-size: 9px;
    border-radius: 3px;
    padding: 1px 4px;
    font-weight: 800;
    color: #000;
  }

  /* DESCRIPTION BOX */
  .desc-box {
    margin-bottom: 16px;
    padding: 13px 16px;
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 10px;
    font-size: 13px;
    color: #374151;
    line-height: 1.7;
    position: relative;
  }
  .desc-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
  .desc-close {
    position: absolute; top: 10px; right: 12px;
    background: transparent; border: none;
    color: var(--dim); font-size: 16px; cursor: pointer;
  }
  .desc-toggle {
    margin-bottom: 16px; padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim); font-size: 11px; cursor: pointer;
    font-family: inherit;
  }

  .alert {
    margin-bottom: 16px; padding: 12px 16px;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 10px;
    display: flex; gap: 10px; align-items: flex-start;

  .alert-icon { font-size: 18px; flex-shrink: 0; }
  .alert-title { font-size: 13px; color: var(--orange); font-weight: 700; margin-bottom: 3px; }
  .alert-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .panel {

    border-radius: 14px;
    padding: 22px;
    min-height: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);

  .panel-title { font-size: 17px; font-weight: 800; margin: 0; }
  .summary-bar {

    border-radius: 0 8px 8px 0;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #1e293b;
  }

  .item {

    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: grid;
    grid-template-columns: 26px 1fr;
    gap: 0 12px;
    align-items: start;
  }
  .item-num {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800;
    margin-top: 2px;

  .item-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 5px; }
  .item-detail { font-size: 12px; color: #374151; line-height: 1.7; margin-bottom: 8px; }
  .achievement {

    border-radius: 7px;
    font-size: 11px;
    line-height: 1.6;

    background: rgba(255,255,255,0.04);
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .meta-link {
    font-size: 10px;
    padding: 2px 8px; border-radius: 4px;
    text-decoration: none;
  }

  .company-input {
    flex: 1; min-width: 160px;
    padding: 13px 14px;
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);

  .company-input:focus { border-color: var(--pink); }
  .company-input:disabled { opacity: 0.5; }

    border-radius: 8px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;

    font-family: inherit;

    border: 1px solid #e9d5ff;
    border-radius: 8px;
    font-size: 13px; color: var(--pink);
  }
  .error-bar {

    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    font-size: 12px; color: var(--red);
    line-height: 1.7;

  .company-header {
    margin-bottom: 14px; padding: 16px;
    background: linear-gradient(135deg, #fdf4ff, #faf5ff);
    border: 1px solid #e9d5ff;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(219,39,119,0.08);

  .company-name { font-size: 19px; font-weight: 800; color: var(--pink); margin-bottom: 8px; }
  .company-date { font-size: 10px; color: var(--dim); }
  .company-desc { font-size: 13px; color: #1e293b; line-height: 1.7; margin-bottom: 10px; }
  .company-news { font-size: 12px; color: #374151; line-height: 1.6; margin-bottom: 10px; }

  .company-official { margin-top: 10px; font-size: 11px; color: var(--pink); text-decoration: none; }
  .services-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; }

  .empty-icon { font-size: 32px; opacity: 0.2; margin-bottom: 8px; }

  .footer { margin-top: 14px; font-size: 10px; color: #475569; text-align: center; }
</style>
</head>

function catColor(cat) {
  const map = { "電子マネー": "#00e5cc", "POS": "#fbbf24", "残高管理": "#a78bfa", "決済端末": "#34d399", "ポイント": "#ff6b6b", "ギフトカード": "#e879f9", "決済": "#60a5fa" };
  for (const key of Object.keys(map)) { if (cat && cat.includes(key)) return map[key]; }
  return "#6b7280";
}

function affinityStyle(level) {
  if (level === "high") return { bg: "rgba(0,229,204,0.1)", border: "rgba(0,229,204,0.35)", text: "#00e5cc", label: "★★★ 高い" };
  if (level === "medium") return { bg: "rgba(251,191,36,0.1)", border: "rgba(251,191,36,0.35)", text: "#fbbf24", label: "★★☆ 中程度" };
  return { bg: "rgba(156,163,175,0.08)", border: "rgba(156,163,175,0.25)", text: "#9ca3af", label: "★☆☆ 低い" };
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" });
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = CATEGORIES.map(cat => {
    const isActive = activeTab === cat.id;
    const style = `border-color:${isActive ? cat.color : "rgba(255,255,255,0.08)"}; background:${isActive ? cat.color+"18" : "rgba(255,255,255,0.03)"}; color:${isActive ? cat.color : "var(--muted)"};`;
    let badge = "";
    if (cat.id === "regulations") badge = `<span class="tag" style="background:#f97316">重要</span>`;
    if (cat.id === "company_research") badge = `<span class="tag" style="background:#e879f9">NEW</span>`;
    return `<button class="tab-btn${isActive?" active":""}" style="${style}" onclick="switchTab('${cat.id}')">${cat.icon} ${cat.label}${badge}</button>`;
  }).join("");
}

function renderDesc() {
  const el = document.getElementById("descBox");
  const cat = CATEGORIES.find(c => c.id === activeTab);

          <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">
            <div class="company-name">${esc(cur.company)}</div>
            ${cur.fetchedAt ? `<span class="company-date">調査日: ${fmtDate(cur.fetchedAt)}</span>` : ""}
          </div>
          <div class="company-desc">${esc(cur.description)}</div>
          ${cur.news ? `<div class="company-news"><strong>📰 最新動向：</strong>${esc(cur.news)}</div>` : ""}
          ${cur.house_emoney_affinity ? `
            <div class="affinity-box" style="background:${af.bg}; border:1px solid ${af.border}">
              <span class="affinity-label">ハウス電子マネー・ギフトカードとの親和性</span>
              <span class="affinity-value" style="color:${af.text}">${af.label}</span>
              ${cur.affinity_reason ? `<span class="affinity-reason">${esc(cur.affinity_reason)}</span>` : ""}
            </div>` : ""}
          ${cur.source_url && cur.source_url.startsWith("http") ? `<a class="company-official" href="${esc(cur.source_url)}" target="_blank">🔗 公式サイト</a>` : ""}
        </div>
        <div class="services-title">展開サービス一覧</div>
        ${(cur.services||[]).map(svc => {
          const cc = catColor(svc.category);
          return `<div class="service-item">
            <span class="service-cat" style="background:${cc}20; color:${cc}; border:1px solid ${cc}40">${esc(svc.category)}</span>
            <div class="service-body">
              <div class="service-name-row">
                <span class="service-name">${esc(svc.name)}</span>
                ${svc.target ? `<span class="service-target">${esc(svc.target)}</span>` : ""}
              </div>
              <div class="service-desc">${esc(svc.description)}</div>
              ${svc.url && svc.url.startsWith("http") ? `<a class="service-link" href="${esc(svc.url)}" target="_blank">🔗 サービスページ</a>` : ""}
            </div>
          </div>`;
        }).join("")}
      </div>`;
  }

  panel.innerHTML = `
    <div style="margin-bottom:16px">
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px">企業名を入力して「調査する」を押してください。</p>
      <div class="company-input-row">
        <input class="company-input" id="companyInput" type="text" placeholder="例：イオン、スマレジ、Square..." ${searchLoading?"disabled":""} onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="search-btn" id="searchBtn"
          style="background:${searchLoading?"rgba(255,255,255,0.04)":"rgba(232,121,249,0.2)"}; border:1px solid ${searchLoading?"rgba(255,255,255,0.1)":"rgba(232,121,249,0.6)"}; color:${searchLoading?"var(--dim)":"#e879f9"}"
          onclick="doSearch()" ${searchLoading?"disabled":""}>
          ${searchLoading?"調査中...":"🔍 調査する"}
        </button>
      </div>
      ${statusHtml}
    </div>
    ${tabsHtml}
    ${companies.length === 0 && !searchLoading ? `<div class="empty-state"><div class="empty-icon">🔍</div><p style="font-size:13px">企業名を入力して調査ボタンを押してください</p></div>` : ""}
    ${resultHtml}`;
}

// ── SEARCH ──────────────────────────────────────────────
async function doSearch() {
  const input = document.getElementById("companyInput");
  const name = input ? input.value.trim() : "";
  if (!name || searchLoading) return;

  // ローディング状態をパネルに直接表示（renderPanel不要）
  searchLoading = true;
  searchError = "";
  searchName = name;
  renderPanel();

  try {
    const prompt = "「" + name + "」について幅広く調査し、以下のJSON形式のみで回答してください（説明文・コードブロック不要）: {\"company\":\"正式企業名\",\"description\":\"企業概要（100文字以内・素人向け）\",\"house_emoney_affinity\":\"high/medium/lowのいずれか\",\"affinity_reason\":\"ハウス電子マネー・ギフトカードとの親和性の理由（80文字以内）\",\"news\":\"最近のニュース・動向・地域との取り組みなど（150文字以内）\",\"source_url\":\"公式サイトURL\",\"services\":[{\"name\":\"サービス・施策名\",\"category\":\"電子マネー/POS/残高管理/決済端末/ポイント/ギフトカード/決済/地域連携/社会貢献/その他\",\"description\":\"素人にもわかるサービス・施策の説明（120文字以内）\",\"target\":\"想定顧客・対象者\",\"url\":\"公式ページURL\"}]} servicesは電子マネー・決済サービスだけでなく、主力事業・地域との取り組み・社会貢献・キャンペーン施策など幅広く8〜15件含めてください。JSONのみ返してください。";

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 4000,
        system: "あなたはフィンテック・決済業界の専門アナリストです。必ずJSONのみで回答してください。",
        messages: [{ role: "user", content: prompt }],
      }),
    });

    const raw = await res.text();
    if (!res.ok) {
      let msg = "HTTP " + res.status;
      try { msg = JSON.parse(raw).error?.message || msg; } catch {}
      throw new Error(msg + " / " + raw.slice(0, 100));
    }
    const data = JSON.parse(raw);
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("").trim();
    const clean = text.replace(/^```json\s*/i,"").replace(/\s*```$/i,"").trim();
    const result = JSON.parse(clean);
    result.fetchedAt = new Date().toISOString();
    const existing = companies.findIndex(c => c.company === result.company);
    if (existing >= 0) companies[existing] = result;
    else companies = [result, ...companies];
    activeCompany = result.company;
    searchError = "";
  } catch (e) {
    searchError = e?.message || String(e);
  } finally {
    searchLoading = false;
    renderPanel();
  }
}

function selectCompany(name) {
  activeCompany = name;
  renderPanel();
}

function switchTab(id) {
  activeTab = id;
  showDesc = true;
  renderAll();
}

function toggleDesc() {
  showDesc = !showDesc;
  renderDesc();
}

// ── INIT ──────────────────────────────────────────────
renderAll();
</script>
</body>
